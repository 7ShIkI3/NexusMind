services:
  backend:
    build: ./backend
    container_name: nexusmind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/nexusmind.db
      - CHROMA_DB_PATH=./data/chroma_db
      - EXTENSIONS_PATH=./extensions
    volumes:
      - ./backend/data:/app/data
      - ./backend/extensions:/app/extensions
    restart: unless-stopped
    networks:
      - nexusmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  rag-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.rag
    container_name: nexusmind-rag
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      - CHROMA_DB_PATH=./data/chroma_db
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - SECRET_KEY=${SECRET_KEY:-nexusmind-secret-change-in-production}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    networks:
      - nexusmind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: nexusmind-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexusmind-net

networks:
  nexusmind-net:
    driver: bridge

volumes:
  nexusmind-data:
