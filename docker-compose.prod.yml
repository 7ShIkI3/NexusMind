version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nexusmind/backend:latest
    container_name: nexusmind-backend-prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=false
      - DATABASE_URL=sqlite:////data/nexusmind.db
      - CHROMA_DB_PATH=/data/chroma_db
      - EXTENSIONS_PATH=/app/extensions
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CORS_ORIGINS=*
    volumes:
      - nexusmind-data:/data
      - ./extensions:/app/extensions:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - nexusmind-net

  rag-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.rag
    image: nexusmind/rag-server:latest
    container_name: nexusmind-rag-prod
    command: uvicorn app.rag_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DEBUG=false
      - CHROMA_DB_PATH=/data/chroma_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - nexusmind-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - nexusmind-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nexusmind/frontend:latest
    container_name: nexusmind-frontend-prod
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nexusmind-net

networks:
  nexusmind-net:
    driver: bridge

volumes:
  nexusmind-data:
    driver: local
